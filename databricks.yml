# This is a Databricks asset bundle definition for agentic_quality_check.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: agentic_quality_check
  uuid: 8a1afdd2-7b1b-472e-bab1-da2b7fa5e599

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  claude_api_key:
    description: Claude API key from Databricks Secrets
    default: "{{secrets/my-api-keys/claude-api-key}}"

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-5dd9bb3c-bf4f.cloud.databricks.com
    variables:
      catalog: workspace
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-5dd9bb3c-bf4f.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/gb.burcea@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/gb.burcea@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: gb.burcea@gmail.com
        level: CAN_MANAGE
